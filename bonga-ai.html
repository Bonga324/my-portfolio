<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Bonga AI - Virtual recruiter assistant for Bonginkosi William Hadebe" />
  <title>Bonga AI | Bonginkosi</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />

  <script src="main.js" defer></script>
</head>

<body>
  <nav class="site-nav" aria-label="Primary Navigation">
    <div class="container nav-inner">
      <a class="logo" href="index.html#home">Bonginkosi<span>.</span></a>

      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu">Menu</button>

      <ul class="nav-links" id="nav-menu">
        <li><a href="index.html#home">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="index.html#experience">Experience</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>

      <a class="nav-cta" href="images/Bonginkosi_Hadebe_CV_Canva_Style.pdf" download>
        <i class="fa-solid fa-file-arrow-down" aria-hidden="true"></i>
        <span>Download CV</span>
      </a>
    </div>
  </nav>

  <main class="ai-page">
    <div class="container ai-shell">
      <section class="ai-chat" aria-label="Bonga AI chat">
        <header class="ai-topbar">
          <div class="ai-brand">
            <div class="ai-orb" aria-hidden="true"></div>
            <div class="ai-title">
              <strong>Bonga AI</strong>
              <span>Recruiter-first walkthrough of Bonginkosi’s profile</span>
            </div>
          </div>

          <div class="ai-toolbar">
            <button class="btn btn-small" id="aiSummary" type="button" title="Generate candidate summary">
              <i class="fa-solid fa-clipboard-list" aria-hidden="true"></i>
              <span class="sr-only">Generate summary</span>
            </button>
            <button class="btn btn-small" id="aiClear" type="button" title="Clear chat">
              <i class="fa-solid fa-trash" aria-hidden="true"></i>
              <span class="sr-only">Clear chat</span>
            </button>
          </div>
        </header>

        <div class="ai-messages" id="aiMessages" aria-live="polite"></div>

        <div class="ai-actions" id="aiActions" aria-label="Actions"></div>

        <div class="ai-composer" aria-label="Message composer">
          <button class="btn btn-small" id="aiMenu" type="button" title="Open menu">
            <i class="fa-solid fa-compass" aria-hidden="true"></i>
            Menu
          </button>

          <textarea id="aiInput" rows="1" placeholder="Ask about payments, POS testing, API testing, experience, education..."></textarea>

          <button class="btn btn-primary" id="aiSend" type="button">
            Send
          </button>
        </div>
      </section>
    </div>
  </main>

  <script src="bonga-ai.js"></script>
</body>
</html>
